<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="16" fill="#0d1117"/>
  <!-- Pull request icon: two circles (commits) connected by a branching arrow -->
  <!-- Base commit circle (left) -->
  <circle cx="36" cy="72" r="12" fill="#238636"/>
  <!-- Head commit circle (right) -->
  <circle cx="108" cy="72" r="12" fill="#3fb950"/>
  <!-- Branch line -->
  <path d="M48 72 Q72 40 96 72" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow tip -->
  <polygon points="96,72 82,62 86,76" fill="#58a6ff"/>
  <!-- PR label -->
  <text x="72" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Open PRs</text>
</svg>
