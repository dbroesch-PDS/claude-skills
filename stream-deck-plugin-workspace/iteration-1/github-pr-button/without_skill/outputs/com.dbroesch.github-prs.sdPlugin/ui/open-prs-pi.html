<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub PRs</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #ccc;
        background: #2d2d2d;
        margin: 0;
        padding: 12px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        color: #aaa;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input, select {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 4px;
        color: #eee;
        padding: 6px 8px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      input[type="password"] { letter-spacing: 0.05em; }
      input:focus, select:focus {
        outline: none;
        border-color: #238636;
      }
      button {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: none;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 8px;
      }
      #connectBtn {
        background: #238636;
        color: #fff;
        font-weight: 600;
      }
      #connectBtn:hover { background: #2ea043; }
      #connectBtn:disabled { background: #444; color: #666; cursor: default; }
      #disconnectBtn {
        background: #444;
        color: #ccc;
      }
      #disconnectBtn:hover { background: #555; }
      #disconnectBtn:disabled { display: none; }
      #status {
        font-size: 11px;
        text-align: center;
        color: #888;
        min-height: 16px;
        margin-bottom: 8px;
      }
      .connected { color: #3fb950 !important; }
      .error { color: #f85149 !important; }
      .info { color: #79c0ff !important; }
      hr { border: none; border-top: 1px solid #3d3d3d; margin: 12px 0; }
      .hint {
        font-size: 10px;
        color: #666;
        margin-top: -10px;
        margin-bottom: 12px;
        line-height: 1.4;
      }
      a { color: #79c0ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>

    <div class="section-title">GitHub OAuth App</div>

    <label>Client ID</label>
    <input type="text" id="clientId" placeholder="Paste your OAuth App Client ID" />

    <label>Client Secret</label>
    <input type="password" id="clientSecret" placeholder="Paste your OAuth App Client Secret" />

    <p class="hint">
      Create an OAuth App at
      <a href="https://github.com/settings/developers" target="_blank">github.com/settings/developers</a>.
      Set the callback URL to <code style="color:#e3b341">http://127.0.0.1:57321/callback</code>
    </p>

    <button id="connectBtn">Connect to GitHub</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <div id="status"></div>

    <hr />

    <label>Show PRs where I am…</label>
    <select id="mode">
      <option value="review-requested">Requested as reviewer</option>
      <option value="authored">The author</option>
      <option value="assigned">Assigned</option>
    </select>

    <script>
      let ws = null;
      let ctx = null;
      let isConnected = false;

      // ── Stream Deck PI entry point ────────────────────────────────────────
      function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
        ctx = JSON.parse(actionInfo).context;

        ws = new WebSocket(`ws://localhost:${port}`);

        ws.onopen = () => {
          ws.send(JSON.stringify({ event: registerEvent, uuid }));
          ws.send(JSON.stringify({ event: "getSettings", context: ctx }));
          ws.send(JSON.stringify({ event: "getGlobalSettings", context: ctx }));
        };

        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);

          if (data.event === "didReceiveSettings") {
            const s = data.payload.settings ?? {};
            if (s.clientId) document.getElementById("clientId").value = s.clientId;
            if (s.clientSecret) document.getElementById("clientSecret").value = s.clientSecret;
            if (s.mode) document.getElementById("mode").value = s.mode;
          }

          if (data.event === "didReceiveGlobalSettings") {
            const s = data.payload.settings ?? {};
            if (s.accessToken) {
              setConnected(true);
            } else {
              setConnected(false);
            }
          }
        };
      }

      // ── UI helpers ────────────────────────────────────────────────────────
      function setStatus(msg, cls) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = cls || "";
      }

      function setConnected(connected) {
        isConnected = connected;
        const btn = document.getElementById("connectBtn");
        const disc = document.getElementById("disconnectBtn");

        if (connected) {
          btn.disabled = true;
          btn.textContent = "Connected to GitHub";
          disc.disabled = false;
          setStatus("Connected", "connected");
        } else {
          btn.disabled = false;
          btn.textContent = "Connect to GitHub";
          disc.disabled = true;
          setStatus("Not connected", "");
        }
      }

      function saveActionSettings() {
        const clientId = document.getElementById("clientId").value.trim();
        const clientSecret = document.getElementById("clientSecret").value.trim();
        const mode = document.getElementById("mode").value;
        ws.send(JSON.stringify({
          event: "setSettings",
          context: ctx,
          payload: { clientId, clientSecret, mode },
        }));
      }

      // ── Event listeners ───────────────────────────────────────────────────
      document.getElementById("clientId").addEventListener("change", saveActionSettings);
      document.getElementById("clientSecret").addEventListener("change", saveActionSettings);
      document.getElementById("mode").addEventListener("change", saveActionSettings);

      document.getElementById("connectBtn").addEventListener("click", () => {
        const clientId = document.getElementById("clientId").value.trim();
        const clientSecret = document.getElementById("clientSecret").value.trim();

        if (!clientId) {
          setStatus("Enter your Client ID first", "error");
          return;
        }
        if (!clientSecret) {
          setStatus("Enter your Client Secret first", "error");
          return;
        }

        saveActionSettings();
        setStatus("Opening GitHub login…", "info");
        document.getElementById("connectBtn").disabled = true;
        document.getElementById("connectBtn").textContent = "Waiting for auth…";

        ws.send(JSON.stringify({
          event: "sendToPlugin",
          context: ctx,
          payload: { event: "startAuth", clientId, clientSecret },
        }));
      });

      document.getElementById("disconnectBtn").addEventListener("click", () => {
        // Clear the stored access token via global settings
        ws.send(JSON.stringify({
          event: "setGlobalSettings",
          context: ctx,
          payload: {},
        }));
        setConnected(false);
        setStatus("Disconnected", "");
      });
    </script>
  </body>
</html>
