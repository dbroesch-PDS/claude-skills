<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Controller Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #ececec;
      background: #1e1e1e;
      padding: 12px;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }
    label { display: block; margin-bottom: 4px; color: #ccc; }
    input {
      width: 100%;
      padding: 6px 8px;
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ececec;
      font-size: 13px;
      margin-bottom: 8px;
    }
    input:focus { outline: none; border-color: #6b7ddb; }
    button {
      width: 100%;
      padding: 7px;
      background: #5865f2;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #4752c4; }
    .status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }
    .status.ok { color: #57f287; }
    .status.err { color: #ed4245; }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">OBS WebSocket Connection</div>
    <label for="obsHost">Host</label>
    <input type="text" id="obsHost" placeholder="127.0.0.1" />
    <label for="obsPort">Port</label>
    <input type="number" id="obsPort" placeholder="4455" min="1" max="65535" />
    <label for="obsPassword">Password</label>
    <input type="password" id="obsPassword" placeholder="(leave blank if none)" />
    <button id="saveBtn">Save &amp; Reconnect</button>
    <div class="status" id="status"></div>
  </div>

  <div class="section" id="micSection" style="display:none;">
    <div class="section-title">Microphone Source</div>
    <label for="micSource">Source Name in OBS</label>
    <input type="text" id="micSource" placeholder="Mic/Aux" />
    <button id="saveMicBtn">Save Mic Source</button>
  </div>

  <script>
    let ws = null;
    let context = null;
    let actionUUID = null;

    function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
      const parsedActionInfo = JSON.parse(actionInfo);
      context = parsedActionInfo.context;
      actionUUID = parsedActionInfo.action;

      // Show mic section only for mute action
      if (actionUUID && actionUUID.includes(".mute")) {
        document.getElementById("micSection").style.display = "block";
      }

      ws = new WebSocket("ws://localhost:" + port);

      ws.onopen = () => {
        ws.send(JSON.stringify({ event: registerEvent, uuid }));
        ws.send(JSON.stringify({ event: "getSettings", context }));
        ws.send(JSON.stringify({ event: "getGlobalSettings", context }));
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.event === "didReceiveGlobalSettings") {
          const s = msg.payload.settings;
          document.getElementById("obsHost").value = s.obsHost ?? "127.0.0.1";
          document.getElementById("obsPort").value = s.obsPort ?? 4455;
          document.getElementById("obsPassword").value = s.obsPassword ?? "";
          setStatus("Settings loaded", "ok");
        }

        if (msg.event === "didReceiveSettings") {
          const s = msg.payload.settings;
          if (s.micSourceName) {
            document.getElementById("micSource").value = s.micSourceName;
          }
        }
      };
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      const payload = {
        obsHost: document.getElementById("obsHost").value.trim() || "127.0.0.1",
        obsPort: parseInt(document.getElementById("obsPort").value) || 4455,
        obsPassword: document.getElementById("obsPassword").value,
      };
      ws.send(JSON.stringify({ event: "setGlobalSettings", context, payload }));
      setStatus("Saved — reconnecting…", "ok");
    });

    document.getElementById("saveMicBtn").addEventListener("click", () => {
      const micSourceName = document.getElementById("micSource").value.trim() || "Mic/Aux";
      ws.send(JSON.stringify({
        event: "setSettings",
        context,
        payload: { micSourceName }
      }));
      setStatus("Mic source saved", "ok");
    });

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + (type || "");
    }
  </script>
</body>
</html>
