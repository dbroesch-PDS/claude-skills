<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene Switcher Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #ececec;
      background: #1e1e1e;
      padding: 12px;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }
    label { display: block; margin-bottom: 4px; color: #ccc; }
    input, select {
      width: 100%;
      padding: 6px 8px;
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ececec;
      font-size: 13px;
      margin-bottom: 8px;
    }
    input:focus, select:focus { outline: none; border-color: #6b7ddb; }
    button {
      width: 100%;
      padding: 7px;
      background: #5865f2;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover { background: #4752c4; }
    button.secondary {
      background: #3a3a3a;
    }
    button.secondary:hover { background: #4a4a4a; }
    .status {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      text-align: center;
    }
    .status.ok { color: #57f287; }
    .status.err { color: #ed4245; }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">Scene Switcher</div>
    <label for="sceneName">Scene Name</label>
    <input type="text" id="sceneName" placeholder="Enter exact scene name" />

    <button id="loadScenesBtn" class="secondary">Load Scenes from OBS</button>
    <select id="sceneList" size="5" style="display:none;">
    </select>

    <button id="saveBtn">Save</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    let ws = null;
    let context = null;

    function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo) {
      const parsedActionInfo = JSON.parse(actionInfo);
      context = parsedActionInfo.context;

      ws = new WebSocket("ws://localhost:" + port);

      ws.onopen = () => {
        ws.send(JSON.stringify({ event: registerEvent, uuid }));
        ws.send(JSON.stringify({ event: "getSettings", context }));
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.event === "didReceiveSettings") {
          const s = msg.payload.settings;
          if (s.sceneName) {
            document.getElementById("sceneName").value = s.sceneName;
          }
        }

        if (msg.event === "sendToPropertyInspector") {
          const scenes = msg.payload.scenes;
          if (Array.isArray(scenes)) {
            populateSceneList(scenes);
          }
        }
      };
    }

    document.getElementById("loadScenesBtn").addEventListener("click", () => {
      ws.send(JSON.stringify({
        event: "sendToPlugin",
        context,
        payload: { action: "getScenes" }
      }));
      setStatus("Loading scenes…", "");
    });

    document.getElementById("sceneList").addEventListener("change", (e) => {
      document.getElementById("sceneName").value = e.target.value;
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const sceneName = document.getElementById("sceneName").value.trim();
      if (!sceneName) {
        setStatus("Please enter a scene name", "err");
        return;
      }
      ws.send(JSON.stringify({
        event: "setSettings",
        context,
        payload: { sceneName }
      }));
      setStatus("Saved", "ok");
    });

    function populateSceneList(scenes) {
      const select = document.getElementById("sceneList");
      select.innerHTML = "";
      scenes.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      select.style.display = "block";
      setStatus(`${scenes.length} scenes loaded`, "ok");
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + (type || "");
    }
  </script>
</body>
</html>
