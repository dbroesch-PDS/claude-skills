<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="12" fill="#1a1a2e"/>
  <!-- Microphone body (grey / muted) -->
  <rect x="54" y="18" width="36" height="56" rx="18" fill="#555"/>
  <!-- Stand arc -->
  <path d="M32 72 Q32 106 72 106 Q112 106 112 72" fill="none" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <!-- Stand stem -->
  <line x1="72" y1="106" x2="72" y2="124" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <line x1="52" y1="124" x2="92" y2="124" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <!-- Red slash through the mic -->
  <line x1="22" y1="22" x2="122" y2="122" stroke="#e74c3c" stroke-width="8" stroke-linecap="round"/>
  <text x="72" y="142" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#e74c3c" text-anchor="middle">MUTED</text>
</svg>
