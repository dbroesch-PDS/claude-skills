<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mic Mute Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #ccc;
        background: #2d2d2d;
        margin: 0;
        padding: 12px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        color: #aaa;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 4px;
        color: #eee;
        padding: 6px 8px;
        font-size: 13px;
        margin-bottom: 4px;
      }
      input:focus { outline: none; border-color: #6b8cff; }
      .hint { font-size: 11px; color: #666; margin-bottom: 12px; }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #eee;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="section-title">Microphone Input</div>

    <label>OBS Input Name</label>
    <input type="text" id="inputName" placeholder="Mic/Aux" />
    <p class="hint">Must match exactly the input name shown in OBS Audio Mixer.</p>

    <script>
      let websocket = null;
      let context = null;

      function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
        context = JSON.parse(inActionInfo).context;
        websocket = new WebSocket(`ws://localhost:${inPort}`);

        websocket.onopen = () => {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
          websocket.send(JSON.stringify({ event: "getSettings", context }));
        };

        websocket.onmessage = (msg) => {
          const data = JSON.parse(msg.data);
          if (data.event === "didReceiveSettings") {
            const s = data.payload.settings;
            if (s.inputName) document.getElementById("inputName").value = s.inputName;
          }
        };
      }

      document.getElementById("inputName").addEventListener("change", () => {
        const inputName = document.getElementById("inputName").value.trim() || "Mic/Aux";
        websocket.send(JSON.stringify({
          event: "setSettings",
          context,
          payload: { inputName },
        }));
      });
    </script>
  </body>
</html>
