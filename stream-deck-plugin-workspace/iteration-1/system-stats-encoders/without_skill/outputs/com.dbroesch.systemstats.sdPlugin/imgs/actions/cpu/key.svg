<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e"/>
  <!-- CPU chip outline -->
  <rect x="42" y="30" width="60" height="60" rx="8" fill="none" stroke="#e94560" stroke-width="3"/>
  <rect x="54" y="42" width="36" height="36" rx="4" fill="#e94560" opacity="0.25"/>
  <!-- Pins top/bottom -->
  <line x1="58" y1="30" x2="58" y2="18" stroke="#e94560" stroke-width="2.5"/>
  <line x1="72" y1="30" x2="72" y2="18" stroke="#e94560" stroke-width="2.5"/>
  <line x1="86" y1="30" x2="86" y2="18" stroke="#e94560" stroke-width="2.5"/>
  <line x1="58" y1="90" x2="58" y2="102" stroke="#e94560" stroke-width="2.5"/>
  <line x1="72" y1="90" x2="72" y2="102" stroke="#e94560" stroke-width="2.5"/>
  <line x1="86" y1="90" x2="86" y2="102" stroke="#e94560" stroke-width="2.5"/>
  <!-- Pins left/right -->
  <line x1="42" y1="50" x2="30" y2="50" stroke="#e94560" stroke-width="2.5"/>
  <line x1="42" y1="60" x2="30" y2="60" stroke="#e94560" stroke-width="2.5"/>
  <line x1="42" y1="70" x2="30" y2="70" stroke="#e94560" stroke-width="2.5"/>
  <line x1="102" y1="50" x2="114" y2="50" stroke="#e94560" stroke-width="2.5"/>
  <line x1="102" y1="60" x2="114" y2="60" stroke="#e94560" stroke-width="2.5"/>
  <line x1="102" y1="70" x2="114" y2="70" stroke="#e94560" stroke-width="2.5"/>
  <!-- Label -->
  <text x="72" y="128" text-anchor="middle" font-family="monospace" font-size="22" fill="#e94560" font-weight="bold">CPU</text>
</svg>
