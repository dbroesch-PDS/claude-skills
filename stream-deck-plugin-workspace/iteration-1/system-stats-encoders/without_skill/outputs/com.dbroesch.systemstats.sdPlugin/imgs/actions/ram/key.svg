<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <!-- Background -->
  <rect width="144" height="144" fill="#1a1a2e"/>
  <!-- RAM stick outline -->
  <rect x="16" y="44" width="112" height="50" rx="6" fill="none" stroke="#4ecca3" stroke-width="3"/>
  <!-- RAM chips -->
  <rect x="24" y="52" width="20" height="34" rx="3" fill="#4ecca3" opacity="0.5"/>
  <rect x="52" y="52" width="20" height="34" rx="3" fill="#4ecca3" opacity="0.5"/>
  <rect x="80" y="52" width="20" height="34" rx="3" fill="#4ecca3" opacity="0.5"/>
  <rect x="108" y="52" width="12" height="34" rx="3" fill="#4ecca3" opacity="0.5"/>
  <!-- Notch at bottom -->
  <rect x="64" y="94" width="16" height="10" rx="2" fill="none" stroke="#4ecca3" stroke-width="2"/>
  <!-- Label -->
  <text x="72" y="128" text-anchor="middle" font-family="monospace" font-size="22" fill="#4ecca3" font-weight="bold">RAM</text>
</svg>
