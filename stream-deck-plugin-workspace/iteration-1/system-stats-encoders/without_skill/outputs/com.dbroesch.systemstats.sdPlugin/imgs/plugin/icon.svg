<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>

  <!-- CPU bar (left) -->
  <rect x="80" y="300" width="80" height="160" rx="8" fill="#16213e"/>
  <rect x="80" y="380" width="80" height="80" rx="8" fill="#0f3460"/>
  <rect x="80" y="360" width="80" height="8" rx="4" fill="#e94560"/>

  <!-- RAM bar (center) -->
  <rect x="216" y="260" width="80" height="200" rx="8" fill="#16213e"/>
  <rect x="216" y="360" width="80" height="100" rx="8" fill="#0f3460"/>
  <rect x="216" y="340" width="80" height="8" rx="4" fill="#4ecca3"/>

  <!-- Net bar (right) -->
  <rect x="352" y="220" width="80" height="240" rx="8" fill="#16213e"/>
  <rect x="352" y="320" width="80" height="140" rx="8" fill="#0f3460"/>
  <rect x="352" y="300" width="80" height="8" rx="4" fill="#f5a623"/>

  <!-- Labels -->
  <text x="120" y="490" text-anchor="middle" font-family="monospace" font-size="40" fill="#888">CPU</text>
  <text x="256" y="490" text-anchor="middle" font-family="monospace" font-size="40" fill="#888">RAM</text>
  <text x="392" y="490" text-anchor="middle" font-family="monospace" font-size="40" fill="#888">NET</text>
</svg>
