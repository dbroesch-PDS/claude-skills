  <!-- Memory chips -->
  <rect x="8"  y="16" width="5" height="8" rx="1" fill="#ce93d8" opacity="0.7"/>
  <rect x="15" y="16" width="5" height="8" rx="1" fill="#ce93d8" opacity="0.7"/>
  <rect x="22" y="16" width="5" height="8" rx="1" fill="#ce93d8" opacity="0.7"/>
  <!-- Notch at bottom -->
